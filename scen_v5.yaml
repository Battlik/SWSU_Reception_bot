  priority: 93
  triggers:
  - \b(после\s+колледж\w*|после\s+техникум\w*|после\s+спо|выпускник\w*\s+колледж\w*|нужно\s+ли\s+егэ\s+после\s+колледж\w*)\b
  response: 'Для выпускников колледжей и техникумов у ЮЗГУ есть отдельная памятка:

    https://ee.swsu.ru/spo.php

    Также может помочь сервис «Нужно ли вам сдавать ЕГЭ?»:

    https://ee.swsu.ru/need_ege.php

    '
