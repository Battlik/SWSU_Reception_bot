matching:
  mode: regex_search
  flags:
  - IGNORECASE
  - UNICODE
  preprocess:
    lowercase: true
    replace_yo_with_e: true
    trim: true
    collapse_spaces: true
  stop_on_first_match: true
intents:
- name: greeting
  priority: 1
  triggers:
  - \b(здравствуй(те)?|добрый\s*(день|вечер|утро)|привет(ствую)?|доброе\s+время\s+суток)\b
  - \bможно\s+(задать|спросить)\s+вопрос\b
  response: Здравствуйте! Я виртуальный помощник приёмной комиссии ЮЗГУ. Напишите вопрос — постараюсь сразу дать на него ответ.
- name: military_training_center
  priority: 99
  triggers:
  - \b(военн\w+\s+кафедр\w*|военн\w+\s+учебн\w+\s+центр\w*|в\.?у\.?ц\.?)\b
  - \bкак\s+(поступить|попасть|подать\s+заявлен\w*)\b.*\b(военн\w+\s+кафедр\w*|в\.?у\.?ц\.?)\b
  - \b(норматив\w*|медкомисси\w*|освобожд\w*\s+от\s+армии|служб\w*\s+в\s+армии)\b.*\b(в\.?у\.?ц\.?|военн\w+\s+кафедр\w*)\b
  response: 'В ЮЗГУ действует Военный учебный центр (ВУЦ). Подробные требования к кандидатам, сроки текущего набора и порядок подачи заявлений публикуются на странице ВУЦ:

    https://swsu.ru/structura/vuc/obyavleniya.php

    Контакты ВУЦ: +7 (4712) 22-25-57, +7 (4712) 22-25-92.

    Если вопрос про набор именно в этом году, откройте страницу ВУЦ — там размещаются актуальные объявления.

    '
- name: admission_working_hours
  priority: 98
  triggers:
  - \b(график|режим|время|часы)\s+работы\b.*\b(при[её]мн\w+\s+комисси\w*|при[её]мк\w*)\b
  - \bдо\s+скольки\b.*\b(при[её]мн\w+\s+комисси\w*|при[её]мк\w*)\b
  - \bво\s+сколько\b.*\b(работает|открывается)\b.*\b(при[её]мн\w+\s+комисси\w*|при[её]мк\w*)\b
  - \bпри[её]мн\w+\s+комисси\w*\s+работает\b
  - \bработает\s+ли\s+(при[её]мн\w+\s+комисси\w*|при[её]мк\w*)\s+в\s+(субботу|воскресенье)\b
  response: 'Приёмная комиссия ЮЗГУ:

    — с сентября по май: пн–пт 09:00–17:00, суббота и воскресенье — выходной;

    — в период летней приёмной кампании приём документов: пн–пт 09:00–16:00, сб–вс 10:00–13:00.

    Контакты: +7 (4712) 25-09-60, +7 (4712) 51-50-24, +7 (4712) 51-50-23, +7 (4712) 22-25-20, e-mail: swsuee@mail.ru.

    Подробно: https://ee.swsu.ru/contacts.php

    '
- name: admission_commission_general
  priority: 97
  triggers:
  - ^\s*при[её]мн\w+\s+комисси\w*[?!.,…]*\s*$
  - ^\s*виртуальн\w+\s+при[её]мн\w+\s+комисси\w*[?!.,…]*\s*$
  - ^\s*при[её]мк\w*[?!.,…]*\s*$
  response: 'Приёмная комиссия ЮЗГУ:


    — контакты: +7 (4712) 25-09-60, +7 (4712) 51-50-24, +7 (4712) 51-50-23, +7 (4712) 22-25-20


    — e-mail: swsuee@mail.ru


    — сайт: https://ee.swsu.ru/
    
    
    — адрес: 305040, г. Курск, ул. 50 лет Октября, 94.


    — график работы:
    
    — с сентября по май: пн–пт 09:00–17:00, суббота и воскресенье — выходной;

    — в период летней приёмной кампании приём документов: пн–пт 09:00–16:00, сб–вс 10:00–13:00.'
- name: admission_entrypoint
  priority: 97
  triggers:
  - ^\s*[Пп]оступить[?!.,…]*\s*$
  - ^\s*[Пп]оступление[?!.,…]*\s*$
  - ^\s*[Кк]ак\s+поступить[?!.,…]*\s*$
  - ^\s*[Сс]пециальности[?!.,…]*\s*$
  - ^\s*[Нн]аправления[?!.,…]*\s*$
  - ^\s*[Пп]рограммы[?!.,…]*\s*$
  - ^\s*[Пп]рограммы\s+обучения[?!.,…]*\s*$
  - ^\s*[Кк]акие\s+программы\s+обучения\s+имеются[?!.,…]*\s*$
  response: 'По поступлению в ЮЗГУ чаще всего нужны эти ссылки:

    — направления и специальности: https://ee.swsu.ru/specs.php?FORM=%25

    — правила приёма: https://swsu.ru/abitur/files/ein/Pravila_priema_SWSU_20.01.2026%282%29.pdf

    — конкурсные списки: https://ee.swsu.ru/list.php

    — приказы о зачислении: https://ee.swsu.ru/orders.php

    — контакты приёмной комиссии: https://ee.swsu.ru/contacts.php

    Напишите, что именно вас интересует: документы, сроки, специальности, общежитие, проходные баллы или подача онлайн.'
- name: programs_and_directions
  priority: 96
  triggers:
  - ^([Пп]оступление|[Пп]оступить|[Сс]пециальности|[Сс]пециальность|[Нн]аправления|[Нн]аправление|[Пп]рограммы|[Пп]рограммы\s+обучения)[?!.,…]*$
  - ^[Кк]акие\s+программы\s+обучения\s+имеются[?!.,…]*$
  - \b(какие\s+направлен\w+|какие\s+специальност\w+|какие\s+программы\s+обучения|направлени\w+\s+подготовки|перечень\s+направлен\w+|список\s+специальност\w+|специальност\w*|направлен\w*|программ\w+\s+обучени\w*|факультет\w*|бакалавриат|магистратур\w*|аспирантур\w*|спо)\b
  - \b(куда\s+можно\s+поступить|что\s+есть\s+в\s+юзгу|какие\s+есть\s+специальности)\b
  - \bкак\s+поступить\b
  response: 'Основные разделы по поступлению в ЮЗГУ:

    — специальности и направления 2026: https://ee.swsu.ru/specs.php?FORM=%25

    — бакалавриат / специалитет: https://swsu.ru/abitur/bachelor/

    — магистратура: https://swsu.ru/abitur/magistr/

    — аспирантура: https://swsu.ru/abitur/aspirant/

    — СПО: https://swsu.ru/abitur/spo_sredn/

    — онлайн-подача документов: https://ee.swsu.ru/entrant_reg.php

    Если напишете факультет, форму обучения или уровень подготовки, я подскажу точнее.'
- name: student_certificate
  priority: 95
  triggers:
  - \b(справк\w+\s+об\s+обучен\w*|справк\w+\s+с\s+места\s+учеб\w*|справк\w+\s+для\s+налог\w*|справк\w+\s+для\s+военкомат\w*|справк\w+\s+вызов\w*|заказать\s+справк\w*|получить\s+справк\w*)\b
  response: 'Справку об обучении можно заказать в студенческом офисе ЮЗГУ:

    г. Курск, ул. 50 лет Октября, 94, кабинет Г-214.

    Также можно оформить справку через личный кабинет: https://info.swsu.ru/

    или отправить запрос на e-mail: stud-office@swsu.ru.

    В письме укажите ФИО, номер группы, место требования и количество экземпляров.

    Телефон студенческого офиса: +7 (4712) 25-09-60.

    График работы: пн–чт 09:00–17:00, пт 09:00–16:00, без перерыва.'
- name: documents_for_admission
  priority: 94
  triggers:
  - \b(какие\s+документ\w+|нужн\w+\s+документ\w+|список\s+документ\w+|перечень\s+документ\w+|что\s+нужно\s+для\s+поступлен\w+)\b
  response: 'Точный перечень документов зависит от уровня образования и основания поступления.

    Для проверки используйте официальный раздел приёмной кампании: https://swsu.ru/abitur/

    Правила приёма 2026/2027: https://swsu.ru/abitur/files/ein/Pravila_priema_SWSU_20.01.2026%282%29.pdf

    Если напишете уровень поступления (бакалавриат / магистратура / аспирантура / СПО), я смогу направить в нужный раздел.

    '
- name: medical_certificate_086
  priority: 94
  triggers:
  - \b(086[-\s]?у|086у|медицинск\w+\s+справк\w*|медсправк\w*)\b
  response: 'Наличие медицинской справки зависит от выбранной программы и требований приёма.

    Проверьте правила приёма и страницу нужного направления:

    — правила приёма 2026/2027: https://swsu.ru/abitur/files/ein/Pravila_priema_SWSU_20.01.2026%282%29.pdf

    — специальности 2026: https://ee.swsu.ru/specs.php?FORM=%25'
