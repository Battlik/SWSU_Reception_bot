  priority: 93
  triggers:
  - \b(академическ\w+\s+отпуск\w*|взять\s+академ\w*|уйти\s+в\s+академ\w*|оформить\s+академ\w*)\b
  response: 'По вопросам академического отпуска информацию нужно уточнять в деканате вашего факультета.

    Если напишете факультет, я подскажу телефон и почту деканата.

    Общий телефонный справочник ЮЗГУ: https://swsu.ru/phones/'
