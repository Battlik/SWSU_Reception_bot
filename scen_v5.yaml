notes:
- Сценарий рассчитан на re.search с флагами IGNORECASE|UNICODE.
- 'Перед сопоставлением рекомендуется: lowercase, trim, replace ё->е, collapse spaces.'
- Сначала проверяйте более специфичные интенты (ВУЦ, конкретный факультет, приоритеты, согласие), потом общие.
- 'Персональные вопросы вида ''поступлю ли я'', ''проверьте по ФИО'' не закрывать общим FAQ: давать ссылку на конкурсные списки или переводить на сотрудника.'
- Перед сопоставлением полезно заменять переносы строк на пробелы, чтобы вопросы из нескольких строк тоже срабатывали.
- Добавлены точечные интенты для коротких запросов вида 'Поступление', 'Специальности', 'Какие программы обучения имеются?'.
- Добавлены сценарии по справке об обучении, академическому отпуску, организационным собраниям первокурсников и расширенные триггеры деканатов/бегунков.
